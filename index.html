<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knockout Bracket Preview</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Tournament LP module</p>
          <h1>Knockout</h1>
        </div>
        <div class="data-tools" aria-label="Data source controls">
          <div class="source-toggle" role="group" aria-label="Preview data source">
            <button class="source-toggle__button is-active" type="button" data-source="./tournament-bracket.json">
              Preview
            </button>
            <button class="source-toggle__button" type="button" data-source="./production.json">
              Production
            </button>
          </div>
          <div class="json-links" aria-label="Open JSON files">
            <a class="json-link" href="./tournament-bracket.json" target="_blank" rel="noreferrer">Preview JSON</a>
            <a class="json-link" href="./production.json" target="_blank" rel="noreferrer">Production JSON</a>
          </div>
        </div>
      </section>

      <section class="bracket-wrap" aria-label="Tournament bracket">
        <div class="bracket" id="bracket"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
